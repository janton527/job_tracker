{% extends "base.html" %}

{% block content %}
	<h1>Delete Application</h1>
	<p>Are you sure you want to delete this application?</p>

	<table border="1">
		<tr>
			{% for column in application.keys() %}
				<th>{{ column }}</th>
			{% endfor %}
		</tr>
		<tr>
			{% for column in application.keys() %}
				<td>{{application[column] }}</td>
			{% endfor %}
		</tr>
	</table>

	<br>

	<form method="POST">
		<button type="submit">Yes, Delete</button>
		<a href="{{ url_for('applications') }}">Cancel</a>
	</form>

{% endblock%}
