{% extends "base.html" %}

{% block content %}
	<h1>{{ 'Edit' if application else 'Add' }} Application</h1>

	<form method="POST">
	
		<label for="job_id">Job ID:</label>
		<input type="number" name="job_id" 
				value="{{ application.job_id if application else '' }}" required><br><br>

		<label for="application_date">Application Date:</label>
		<input type="date" name="application_date"
				value="{{ application.application_date if application else '' }}" required><br><br>

		<label for="status">Application Status:</label>
		<input type="text" name="status"
				value="{{ application.status if application else '' }}"><br><br>

		<label for="resume_version">Resume Version:</label>
		<input type="text" name="resume_version" 
				value="{{ application.resume_version if application else '' }}" required><br><br>

		<label for="cover_letter_sent">Coverletter Sent:</label>
		<input type="checkbox" name="cover_letter_sent" 
				{% if application and application.cover_letter_sent %}checked{%endif%}><br><br>

				<input type="submit" value="{{ 'Update' if application else 'Add'}} Application">
	</form>

{% endblock %}
