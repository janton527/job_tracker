{% extends "base.html" %}

{% block content %}
	<h1>{{ 'Edit' if company else 'Add' }} Company</h1>
	<form method="POST">
		
		<label for="company_name">Company Name:</label>
		<input type="text" name="company_name"
						   value="{{ company.company_name if company else '' }}" required><br><br>

		<label for="industry">Industry:</label>
		<input type="text" name="industry"
						   value="{{ company.industry if company else '' }}" required><br><br>

		<label for="website">Website:</label>
		<input type="text" name="website"
					   value="{{ company.website if company else '' }}" required><br><br>

		<label for="city">City:</label>
		<input type="text" name="city"
					   value="{{ company.city if company else '' }}" required><br><br>

		<label for="state">State:</label>
		<input type="text" name="state"
					   value="{{ company.state if company else '' }}" required><br><br>

		<label for="notes">Notes:</label>
		<input type="text" name="notes"
					   value="{{ company.notes if company else '' }}" required><br><br>

		<input type="submit" value="{{ 'Update' if company else 'Add' }} Company">
	</form>

{% endblock %}
